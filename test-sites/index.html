<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RewriteLLM A/B singleton test</title>
    <style>
      :root {
        color: #18232b;
        background: #eaf0f2;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      header {
        align-items: center;
        display: flex;
        justify-content: space-between;
        min-height: 76px;
        padding: 18px 22px;
      }

      h1 {
        font-size: 24px;
        line-height: 1.1;
        margin: 0;
      }

      a {
        color: #185b67;
        font-weight: 800;
      }

      .frames {
        display: grid;
        gap: 14px;
        grid-template-columns: 1fr 1fr;
        height: calc(100vh - 76px);
        padding: 0 14px 14px;
      }

      iframe {
        background: #ffffff;
        border: 1px solid #bccad0;
        border-radius: 8px;
        height: 100%;
        width: 100%;
      }

      @media (max-width: 980px) {
        header {
          align-items: flex-start;
          display: grid;
          gap: 6px;
        }

        .frames {
          grid-template-columns: 1fr;
          height: auto;
        }

        iframe {
          height: 760px;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>RewriteLLM singleton test</h1>
      <nav>
        <a href="/test-sites/site-a/">Site A</a>
        <a href="/test-sites/site-b/">Site B</a>
      </nav>
    </header>
    <div class="frames">
      <iframe title="Site A" src="/test-sites/site-a/"></iframe>
      <iframe title="Site B" src="/test-sites/site-b/"></iframe>
    </div>
  </body>
</html>
